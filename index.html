<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TSMC ADR 괴리율 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
body{font-family:-apple-system,'Noto Sans KR',sans-serif;max-width:1100px;margin:24px auto;padding:0 16px;color:#1f2328;background:#fff}
h2{margin:0 0 4px}
.sub{color:#57606a;font-size:13px;margin-bottom:16px}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.card{border:1px solid #d0d7de;border-radius:8px;padding:10px 16px;min-width:120px}
.card .k{font-size:12px;color:#57606a}
.card .v{font-size:20px;font-weight:600}
.pos{color:#1a7f37}.neg{color:#cf222e}
.range{margin-bottom:12px}
.range button{border:1px solid #d0d7de;background:#f6f8fa;border-radius:6px;padding:4px 12px;margin-right:6px;cursor:pointer;font-size:13px}
.range button.on{background:#1f6feb;color:#fff;border-color:#1f6feb}
.box{margin-bottom:28px}
.note{color:#57606a;font-size:12px;line-height:1.6}
</style>
</head>
<body>
<h2>TSMC 본주 vs ADR 괴리율</h2>
<div class="sub" id="updated"></div>

<div class="cards" id="cards"></div>

<div class="range" id="range">
<button data-y="all" class="on">전체</button>
<button data-y="10">10년</button>
<button data-y="5">5년</button>
<button data-y="3">3년</button>
<button data-y="1">1년</button>
</div>

<div class="box"><canvas id="px" height="110"></canvas></div>
<div class="box"><canvas id="pr" height="80"></canvas></div>

<p class="note">
괴리율 = TSM ADR(USD) ÷ [2330.TW 종가 × 5주 ÷ USD/TWD] − 1. 1 ADR = 보통주 5주.<br>
대만장(현지 13:30)과 뉴욕장 마감 시점 차이로 동일 날짜라도 ADR이 최신 정보를 먼저 반영함.<br>
데이터: Yahoo Finance (환율 시계열 시작 시점부터 괴리율 계산 가능). 매 영업일 07:00 KST 자동 갱신.
</p>

<script>
let D=null, chPx=null, chPr=null;

function slice(arr, from){ return arr.slice(from); }

function render(years){
  let from = 0;
  if (years !== 'all'){
    const cutoff = new Date();
    cutoff.setFullYear(cutoff.getFullYear() - Number(years));
    const c = cutoff.toISOString().slice(0,10);
    from = D.dates.findIndex(d => d >= c);
    if (from < 0) from = 0;
  }
  const L = slice(D.dates, from);
  if (chPx) chPx.destroy();
  if (chPr) chPr.destroy();

  chPx = new Chart(document.getElementById('px'), {
    type:'line',
    data:{labels:L, datasets:[
      {label:'TSM ADR (USD)', data:slice(D.tsm,from),
       borderColor:'#1f6feb', borderWidth:1.2, pointRadius:0},
      {label:'본주 환산가 (USD)', data:slice(D.local,from),
       borderColor:'#d29922', borderWidth:1.2, pointRadius:0, spanGaps:true}
    ]},
    options:{
      animation:false,
      scales:{y:{type:'logarithmic'}, x:{ticks:{maxTicksLimit:12}}},
      plugins:{title:{display:true,text:'주가 비교 (ADR 환산, 로그스케일)'},
               tooltip:{mode:'index',intersect:false}},
      interaction:{mode:'index',intersect:false}
    }
  });

  chPr = new Chart(document.getElementById('pr'), {
    type:'line',
    data:{labels:L, datasets:[
      {label:'괴리율 (%)', data:slice(D.premium_pct,from),
       borderColor:'#2ea043', backgroundColor:'rgba(46,160,67,.20)',
       fill:'origin', borderWidth:1, pointRadius:0, spanGaps:true},
      {label:'60일 이동평균', data:slice(D.premium_ma60_pct,from),
       borderColor:'#cf222e', borderWidth:1.2, pointRadius:0, spanGaps:true}
    ]},
    options:{
      animation:false,
      scales:{x:{ticks:{maxTicksLimit:12}}},
      plugins:{title:{display:true,text:'ADR 프리미엄 / 디스카운트 (%)'},
               tooltip:{mode:'index',intersect:false}},
      interaction:{mode:'index',intersect:false}
    }
  });
}

fetch('data/premium.json').then(r=>{
  if(!r.ok) throw new Error('premium.json 없음 — Actions 첫 실행 여부 확인');
  return r.json();
}).then(d=>{
  D=d;
  const s=d.stats;
  const cls=v=>v>=0?'pos':'neg';
  const f=v=>(v>=0?'+':'')+v.toFixed(2)+'%';
  document.getElementById('updated').textContent =
    `업데이트: ${d.updated} · 괴리율 시계열: ${d.premium_start} ~ ${s.latest_date}`;
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="k">최근 괴리율 (${s.latest_date})</div>
      <div class="v ${cls(s.latest)}">${f(s.latest)}</div></div>
    <div class="card"><div class="k">최근 1년 평균</div>
      <div class="v ${cls(s.mean_1y)}">${f(s.mean_1y)}</div></div>
    <div class="card"><div class="k">전체 평균 / 중앙값</div>
      <div class="v">${f(s.mean)} / ${f(s.median)}</div></div>
    <div class="card"><div class="k">역대 최대 (${s.max_date})</div>
      <div class="v pos">${f(s.max)}</div></div>
    <div class="card"><div class="k">역대 최소 (${s.min_date})</div>
      <div class="v neg">${f(s.min)}</div></div>`;
  render('all');
}).catch(e=>{
  document.getElementById('updated').textContent = '데이터 로드 실패: ' + e.message;
});

document.getElementById('range').addEventListener('click', e=>{
  if(e.target.tagName!=='BUTTON') return;
  document.querySelectorAll('.range button').forEach(b=>b.classList.remove('on'));
  e.target.classList.add('on');
  render(e.target.dataset.y);
});
</script>
</body>
</html>
